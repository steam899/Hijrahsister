<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Client SDKs for Auth & Storage -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" class="w-full mb-4 p-3 border rounded" required>
                <input type="password" id="password" placeholder="Password" class="w-full mb-6 p-3 border rounded" required>
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Login</button>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden" id="sidebar">
        <div class="p-6 font-bold text-xl border-b border-gray-800">Admin CMS</div>
        <nav class="flex-1 p-4 space-y-2" id="menu-container">
            <!-- Menus generated by JS -->
        </nav>
        <button id="logout-btn" class="p-4 bg-red-600 hover:bg-red-700 text-left font-bold">Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col hidden h-screen overflow-hidden" id="main-content">
        <header class="bg-white shadow px-8 py-4 flex justify-between items-center">
            <h2 id="page-title" class="text-2xl font-bold text-gray-800">Dashboard</h2>
            <button id="add-new-btn" class="hidden bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Add New</button>
        </header>
        
        <div class="flex-1 overflow-y-auto p-8">
            <!-- Dynamic Data Table / Forms injected here -->
            <div id="content-area" class="bg-white rounded-lg shadow p-6"></div>
        </div>
    </main>

    <script src="/admin/app.js"></script>
</body>
</html>
