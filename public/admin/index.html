<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hijrah Sisters - Admin CMS Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Auth Client SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex overflow-hidden">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50 transition-all duration-300">
        <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-pink-500/10 text-pink-500 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-pink-500/20">
                    <i class="fa-solid fa-leaf text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-pink-400">Admin Login</h2>
                <p class="text-sm text-gray-400 mt-1">Hijrah Sisters IIUMK Dashboard</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">E-mel</label>
                    <input type="email" id="email" placeholder="admin@hijrahsisters.com" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl focus:border-pink-500 focus:outline-none text-white text-sm transition-colors" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Kata Laluan</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-xl focus:border-pink-500 focus:outline-none text-white text-sm transition-colors" required>
                </div>
                <button type="submit" class="w-full bg-pink-600 hover:bg-pink-700 text-white p-3 rounded-xl font-bold text-sm tracking-wide transition-all shadow-lg shadow-pink-900/30 active:scale-95">
                    Log Masuk <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col hidden" id="sidebar">
        <div class="p-6 border-b border-gray-800 flex items-center gap-3">
            <div class="w-8 h-8 bg-pink-500/10 text-pink-500 rounded-lg flex items-center justify-center border border-pink-500/20">
                <i class="fa-solid fa-leaf text-base"></i>
            </div>
            <div>
                <h2 class="font-serif font-bold text-md text-white leading-none">Hijrah Sisters</h2>
                <span class="text-[9px] tracking-widest uppercase text-pink-400 font-bold">Admin CMS</span>
            </div>
        </div>
        
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto" id="menu-container">
            <!-- Menu pilihan akan dimasukkan secara dinamik melalui app.js -->
        </nav>
        
        <button id="logout-btn" class="p-4 bg-gray-900/50 hover:bg-red-950/30 hover:text-red-400 text-center font-bold border-t border-gray-850 transition-colors flex items-center justify-center gap-2 text-sm text-gray-400">
            <i class="fa-solid fa-power-off text-xs"></i> Log Keluar
        </button>
    </aside>

    <!-- Main Content Panel -->
    <main class="flex-1 flex flex-col hidden h-screen overflow-hidden bg-gray-900" id="main-content">
        <!-- Header Utama Dashboard -->
        <header class="bg-gray-950 border-b border-gray-800 px-8 py-4 flex justify-between items-center z-10">
            <h2 id="page-title" class="text-xl font-bold text-white tracking-wide">Dashboard</h2>
            <button id="add-new-btn" class="hidden bg-pink-600 hover:bg-pink-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md shadow-pink-900/20 transition-all active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-plus text-xs"></i> Tambah Baru
            </button>
        </header>
        
        <!-- Ruang Borang / Table CMS -->
        <div class="flex-1 overflow-y-auto p-8">
            <div id="content-area" class="bg-gray-950 border border-gray-800 rounded-2xl shadow-2xl p-8 max-w-5xl mx-auto">
                <!-- Diisi oleh app.js -->
            </div>
        </div>
    </main>

    <!-- CMS Core Engine Loader (app.js berada di folder yang sama) -->
    <script src="app.js"></script>
</body>
</html>
